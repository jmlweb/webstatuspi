name: Security

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Run weekly on Monday at 9:00 UTC
    - cron: "0 9 * * 1"

jobs:
  dependency-audit:
    runs-on: ubuntu-latest
    name: Dependency Audit

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install pip-audit
        run: |
          python -m pip install --upgrade pip
          pip install pip-audit

      - name: Run pip-audit
        # Create an isolated venv with only project deps to avoid false positives
        # from packages installed in pip-audit itself (e.g. pygments via rich).
        run: |
          python -m venv /tmp/audit-venv
          /tmp/audit-venv/bin/pip install --quiet -r requirements.txt -r requirements-dev.txt
          pip-audit --strict --progress-spinner off --path /tmp/audit-venv/lib/python*/site-packages

  codeql:
    runs-on: ubuntu-latest
    name: CodeQL Analysis
    permissions:
      security-events: write
      actions: read
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: python

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:python"
